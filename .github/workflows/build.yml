name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Download ffmpeg
        run: |
          mkdir ffmpeg
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_temp
          $bin = Get-ChildItem ffmpeg_temp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $bin.FullName "ffmpeg/ffmpeg.exe"
          $probe = Get-ChildItem ffmpeg_temp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $probe.FullName "ffmpeg/ffprobe.exe"
        shell: pwsh

      - name: Download Korean font
        run: |
          python -c "
          import urllib.request, re, os
          os.makedirs('assets/fonts', exist_ok=True)
          css = urllib.request.urlopen(urllib.request.Request(
              'https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700',
              headers={'User-Agent':'Mozilla/5.0'})).read().decode()
          m = re.search(r'src: url\((https://[^)]+\.ttf)\)', css)
          if m: urllib.request.urlretrieve(m.group(1), 'assets/fonts/NotoSansKR-Bold.ttf')
          "

      - name: Build with PyInstaller
        run: |
          pyinstaller sermon_shorts.spec --noconfirm

      - name: Package
        run: |
          Copy-Item ".env.example" "dist/SermonShorts/.env.example"
          Compress-Archive -Path "dist/SermonShorts/*" -DestinationPath "SermonShorts-Windows.zip"
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: SermonShorts-Windows
          path: SermonShorts-Windows.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Download Korean font
        run: |
          python -c "
          import urllib.request, re, os
          os.makedirs('assets/fonts', exist_ok=True)
          css = urllib.request.urlopen(urllib.request.Request(
              'https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700',
              headers={'User-Agent':'Mozilla/5.0'})).read().decode()
          m = re.search(r'src: url\((https://[^)]+\.ttf)\)', css)
          if m: urllib.request.urlretrieve(m.group(1), 'assets/fonts/NotoSansKR-Bold.ttf')
          "

      - name: Build with PyInstaller
        run: |
          pyinstaller sermon_shorts.spec --noconfirm

      - name: Package
        run: |
          cp .env.example dist/SermonShorts/
          cd dist && zip -r ../SermonShorts-Mac.zip SermonShorts/

      - uses: actions/upload-artifact@v4
        with:
          name: SermonShorts-Mac
          path: SermonShorts-Mac.zip

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SermonShorts-Windows/SermonShorts-Windows.zip
            SermonShorts-Mac/SermonShorts-Mac.zip
          body: |
            ## Sermon Shorts Generator

            ### 설치 방법
            1. 자신의 OS에 맞는 zip 다운로드
            2. 압축 해제
            3. `.env.example` → `.env`로 이름 변경 후 API 키 입력
            4. `SermonShorts` 실행 (Windows: .exe / Mac: 앱)
            5. 브라우저가 자동으로 열립니다

            ### 필요한 API 키
            - `OPENAI_API_KEY` (필수)
            - `GEMINI_API_KEY` (선택)
